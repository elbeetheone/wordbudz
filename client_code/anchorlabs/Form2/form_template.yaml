container:
  properties:
    html: |-
      <!DOCTYPE html>
      <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Speech & Audio Control</title>
          <style>
            .texts {
              margin-top: 20px;
              display: none; /* Hide the texts div */
            }
            .disabled {
              pointer-events: none;
              opacity: 0.5;
            }
            audio {
              display: none;
            }
          </style>
        </head>
        <body>

          <div class="container">
            <div class="texts"></div>
            <div anvil-slot="voice_recording_button"></div>
            <div anvil-slot="clip_playing_button"></div>
          </div>

          <figure>
            <audio preload="auto" controlsList="nodownload" id="player">
              <source id="sourceMp3" src="" type="audio/mp3" />
              Your browser does not support the <code>audio</code> element.
            </audio>
          </figure>

          <script>
            (function() { // IIFE starts here

              const texts = document.querySelector(".texts");

              window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
              let recognition = new SpeechRecognition();
              recognition.interimResults = true;
              let isRecognitionStopped = false;
              let p = document.createElement("p");

              recognition.addEventListener("result", (e) => {
                texts.appendChild(p);
                const text = Array.from(e.results).map(result => result[0]).map(result => result.transcript).join("");
                p.innerText = text;
                if (e.results[0].isFinal) {
                  p = document.createElement("p");
                }
              });

              recognition.addEventListener("end", () => {
                if (!isRecognitionStopped) {
                  recognition.start();
                }
              });

              window.stopRecognition = function() {
                isRecognitionStopped = true;
                recognition.stop();
              };

              window.startRecognition = function() {
                isRecognitionStopped = false;
                recognition.start();
              };

              window.getAllTexts = function() { // Global getAllTexts
                const paragraphs = texts.querySelectorAll("p");
                let allText = "";
                paragraphs.forEach((paragraph) => {
                  allText += paragraph.innerText + " ";
                });
                texts.innerHTML = "";
                return allText.trim();
              };

            })(); // IIFE ends here

            // Load Clip Function (now only handles audio playback)
            window.loadClip = function(x) {
              var player = document.getElementById('player');
              window.stopRecognition();
              player.src = x;
              player.play();

              player.onended = function () {
                isRecognitionStopped = false;
                window.enableRecordingButton(); // Re-enable recording button after clip ends.
              };
            };

            // Attach event listeners for Anvil slots
            window.addEventListener('DOMContentLoaded', function() {
              let recordButton = document.querySelector("div[anvil-slot='voice_recording_button']");
              let clipButton = document.querySelector("div[anvil-slot='clip_playing_button']");

              if (recordButton) {
                recordButton.addEventListener("click", function() {
                  window.startRecognition();
                  // Enable clip button from anvil code.
                });
              }

              if (clipButton) {
                clipButton.addEventListener("click", function() {
                  let audioURL = "YOUR_AUDIO_URL_HERE"; // Replace with actual audio URL
                  if (audioURL.trim() !== "") {
                    window.loadClip(audioURL);
                    // Disable clip button from anvil code.
                  }
                });
              }
              if (clipButton){
                clipButton.classList.add('disabled'); //clip button starts disabled.
              }
            });

            // Anvil control functions
            window.enableRecordingButton = function() {
              let recordButton = document.querySelector("div[anvil-slot='voice_recording_button']");
              if (recordButton) recordButton.classList.remove("disabled");
            };

            window.disableRecordingButton = function() {
              let recordButton = document.querySelector("div[anvil-slot='voice_recording_button']");
              if (recordButton) recordButton.classList.add("disabled");
            };

            window.enableClipButton = function() {
              let clipButton = document.querySelector("div[anvil-slot='clip_playing_button']");
              if (clipButton) clipButton.classList.remove("disabled");
            };

            window.disableClipButton = function() {
              let clipButton = document.querySelector("div[anvil-slot='clip_playing_button']");
              if (clipButton) clipButton.classList.add("disabled");
            };

          </script>

        </body>
      </html>
  type: HtmlTemplate
is_package: true
