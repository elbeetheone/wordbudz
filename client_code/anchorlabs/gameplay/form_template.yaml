components:
- components:
  - layout_properties: {grid_position: 'OIBZXJ,HVTEHR'}
    name: image_3
    properties: {source: _/theme/anchors.png}
    type: Image
  - components:
    - event_bindings: {tick: timer_1_tick}
      layout_properties: {grid_position: 'KBFZRH,TSOSVJ'}
      name: timer_1
      properties: {}
      type: Timer
    - layout_properties: {grid_position: 'SSTIFV,HHSCCX'}
      name: label_5
      properties: {align: center, bold: true, foreground: 'theme:Primary 500', icon: '', spacing_above: none, spacing_below: none, text: Select Your Desired Speed...}
      type: Label
    - layout_properties: {grid_position: 'NHFFYX,JPXRUU'}
      name: slow
      properties: {background: '', bold: true, font: arial, font_size: 12, foreground: 'theme:Primary 500', italic: true, role: null, text: SLOW}
      type: RadioButton
    - layout_properties: {grid_position: 'NHFFYX,ZJWFCE'}
      name: medium
      properties: {align: center, background: '', bold: true, font: arial, font_size: 12, foreground: 'theme:Primary 500', italic: true, role: null, selected: true, text: MEDIUM}
      type: RadioButton
    - layout_properties: {grid_position: 'NHFFYX,IJFDEG'}
      name: fast
      properties: {align: right, background: '', bold: true, font: arial, font_size: 12, foreground: 'theme:Primary 500', italic: true, role: null, text: FAST}
      type: RadioButton
    - event_bindings: {click: button_1_click}
      layout_properties: {grid_position: 'QFJODT,KCRZJB'}
      name: button_1
      properties: {background: 'theme:Primary 700', font_size: 45, role: primary-color, text: GENERATE}
      type: Button
    - layout_properties: {full_width_row: true, grid_position: 'VYXSTV,YLOGJX'}
      name: label_1
      properties: {background: 'theme:Primary 500', bold: true, font_size: 55, foreground: 'theme:White', role: scroll2, visible: false}
      type: Label
    - components:
      - components:
        - layout_properties: {grid_position: 'IIJCJR,HUDYDP'}
          name: label_2
          properties: {align: center, bold: true, font_size: 45, foreground: 'theme:White', text: ''}
          type: Label
        layout_properties: {grid_position: 'WFAQUH,EIJFID'}
        name: card_3
        properties: {background: 'theme:Primary 700', foreground: 'theme:White', role: message}
        type: ColumnPanel
      - components:
        - layout_properties: {grid_position: 'IWEEJM,THSAGC HKACSW,JHNAML'}
          name: label_3_copy
          properties: {align: center, bold: true, font_size: 45, text: Generated Text}
          type: Label
        - layout_properties: {grid_position: 'IWEEJM,THSAGC QOTLSU,ROIHVF'}
          name: image_1
          properties: {display_mode: zoom_to_fill, height: 205}
          type: Image
        - layout_properties: {grid_position: 'IWEEJM,HPVBPI SJJNZW,DIURDO'}
          name: label_4
          properties: {align: center, bold: true, font_size: 45, text: Your Transcript}
          type: Label
        - layout_properties: {grid_position: 'IWEEJM,HPVBPI BIIDSV,FAOMCK'}
          name: image_2
          properties: {display_mode: zoom_to_fill, height: 202}
          type: Image
        - event_bindings: {click: share_click}
          layout_properties: {grid_position: 'RQRAHJ,ARGTFQ'}
          name: share
          properties: {align: center, font_size: 30, foreground: 'theme:White', icon: 'fa:share-alt', icon_align: top, spacing_above: large}
          type: Link
        layout_properties: {grid_position: 'EGJDMI,NSZXGD'}
        name: card_2
        properties: {background: 'theme:Primary 500', role: message}
        type: ColumnPanel
      layout_properties: {full_width_row: true, grid_position: 'JOIZUF,YHCBFB'}
      name: index
      properties: {role: message, visible: false}
      type: ColumnPanel
    layout_properties: {full_width_row: true, grid_position: 'DEHDWW,ROUIEG'}
    name: content_panel_copy
    properties: {role: card}
    type: ColumnPanel
  layout_properties: {slot: default}
  name: content_panel
  properties: {}
  type: ColumnPanel
- components:
  - name: speakeasi
    properties: {bold: true, font_size: 14, foreground: '', role: null, text: AnchorLabs}
    type: Label
  layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {}
  type: FlowPanel
- event_bindings: {click: link_1_click}
  layout_properties: {slot: top-left-btn}
  name: link_1
  properties: {bold: true, font_size: 14, icon: 'fa:arrow-circle-left', spacing_above: small, text: '', underline: true}
  type: Link
container:
  properties: {html: '@theme:standard-page.html'}
  type: HtmlTemplate
is_package: true
