components: []
container:
  properties:
    html: |-
      <center style="font-style:italic; color:#888; margin: 3em;">
      <!DOCTYPE html>
      <html>
        <head>
          <title>Animated Circle Sound Visualizer</title>
          <style>
            body {
              /* background-color: #201c26; /* Dark background */ */
              /* display: flex;
              justify-content: center;
              align-items: center;
              min-height: 100vh;
              margin: 0;
              overflow: hidden; /* Hide overflow for outer circle effect */ */
            }



            .circle-container {
              position: relative; /* For positioning the outer circle */
              width: 100px;
              height: 100px;
            }

            .circle {
              width: 100%;
              height: 100%;
              border-radius: 50%;
              background-color: lime; /* Bright color */
              box-shadow: 0 0 20px lime; /* Glow effect */
              animation: pulse 1.5s infinite ease-in-out; /* Primary animation */
            }

            .outer-circle {
              position: absolute;
              top: -20%; /* Adjust for desired outer circle size */
              left: -20%;
              width: 140%; /* Adjust for desired outer circle size */
              height: 140%;
              border-radius: 50%;
              border: 2px solid lime; /* Outline color */
              opacity: 0; /* Initially hidden */
              animation: expand 1.5s infinite ease-in-out; /* Secondary animation */
            }


            @keyframes pulse {
              0% {
                transform: scale(1);
                opacity: 1;
              }
              50% {
                transform: scale(1.1);
                opacity: 0.7;
              }
              100% {
                transform: scale(1);
                opacity: 1;
              }
            }

            @keyframes expand {
              0% {
                transform: scale(0.8); /* Start slightly smaller */
                opacity: 0;
              }
              50% {
                transform: scale(1);
                opacity: 1;
              }
              100% {
                transform: scale(0.8);
                opacity: 0;
              }
            }
          </style>
        </head>
        <body>

          <div class="circle-container">
            <div class="circle"></div>
            <div class="outer-circle"></div>
          </div>

        </body>
      </html>
      </center>
      <div anvil-slot="default"></div>
  type: HtmlTemplate
is_package: true
