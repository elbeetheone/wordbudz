    html: "<!DOCTYPE html>\n<html>\n<head>\n    <title>Custom T-Shirt Designer</title>\n    <style>\n        body {\n            background-color: #f0f0f0;\n            /* font-family: Arial, sans-serif; */\n        }\n\n        .shirt-container {\n            display: flex;\n            justify-content: space-between;\n        }\n\n        .shirt-image {\n            width: 400px;\n            height: 500px;\n            border: 1px solid #ccc;\n            background-image: url(\"_/theme/white.png\"); /* Replace with your image path */\n            background-size: cover;\n            background-repeat: no-repeat;\n            background-position: center center;\n            position: relative;\n        }\n\n        .design-overlay {\n            position: absolute;\n            top: 50%;\n            left: 50%;\n            transform: translate(-50%, -50%);\n        }\n    </style>\n</head>\n<body>\n    <div class=\"shirt-container\">\n        <div class=\"shirt-image\">\n            <div anvil-slot=\"default\"></div>\n        </div>\n    </div>\n  \n</body>\n</html>"
