    type: Label
  - event_bindings: {click: link_3_click}
    layout_properties: {grid_position: 'JDADKK,MYDFFT'}
    name: link_3
    properties: {align: left, foreground: 'theme:Secondary 700', icon: 'fa:minus', spacing_above: medium, spacing_below: none, text: ''}
    type: Link
  layout_properties: {column: JKSDUP}
  name: card_1
  properties: {role: message, spacing_above: none, spacing_below: none, wrap_on: never}
  type: ColumnPanel
- layout_properties: {}
  name: label_23
  properties:
    background: theme:Gray 200
    font_size: 0
    spacing:
      padding: [1, null, 0, null]
    spacing_above: none
    spacing_below: none
    text: ''
  type: Label
container:
  properties: {foreground: 'theme:Primary 700'}
  type: DataRowPanel
is_package: true
