components:
- data_bindings:
  - {code: 'self.item[''price''] * self.item[''num_item'']', property: text, writeback: false}
  layout_properties: {column: VJQQOR}
  name: label_2
  properties: {foreground: 'theme:Primary 500', text: ''}
  type: Label
- data_bindings:
  - {code: 'self.item[''item_description'']', property: text, writeback: false}
  event_bindings: {click: link_1_click}
  layout_properties: {column: JKSDUP}
  name: link_1
  properties: {foreground: 'theme:Primary 700', text: ''}
  type: Link
- components:
  - data_bindings:
    - {code: 'self.item[''trans_id'']', property: text, writeback: false}
    layout_properties: {grid_position: 'NTEXHG,ZOCFAU'}
    name: label_1
    properties: {font_size: 0}
    type: Label
  event_bindings: {click: trash_click}
  layout_properties: {column: FNDNPO}
  name: trash
  properties: {foreground: '#FF0000', icon: 'fa:trash'}
  type: Link
- components:
  - event_bindings: {click: link_2_click}
    layout_properties: {grid_position: 'JDADKK,BOJJPI'}
    name: link_2
