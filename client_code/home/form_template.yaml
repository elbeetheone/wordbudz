container:
  properties:
    html: |
      <!DOCTYPE html>
      <html>
        <head>
          <style>
            /* Style the top navigation bar */
            .topnav {
              background-color: white;
              overflow: hidden;
              position: fixed;
              top: 0;
              width: 100%;
              z-index: 100;
              height: 70px; /* ✅ Explicit height */
              box-shadow: 0px 2px 5px rgba(0,0,0,0.1); /* Optional: slight shadow */
            }

            /* Style the links inside the navigation bar */
            .topnav a {
              float: left;
              color: blue;
              text-align: center;
              padding: 18px 16px;
              text-decoration: none;
              font-size: 17px;
            }

            /* Add some padding to the body to prevent content from being hidden behind the fixed navbar */
            body {
              margin: 0;
              padding-top: 60px; /* ✅ Match the .topnav height */
            }
          </style>
        </head>
        <body>

          <div class="topnav">
            <div anvil-slot="default_"></div>
          </div>

          <div style="padding-left:0px; height: 1200px;">
            <div anvil-slot="default"></div>
          </div>

        </body>
      </html>
  type: HtmlTemplate
is_package: true
