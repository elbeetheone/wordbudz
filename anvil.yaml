metadata: {description: Find Your Word a Bud., logo_img: 'asset:wordbudz-high-resolution-logo-white.png', title: WordBudz}
name: WordBudz
native_deps:
  head_html: |-
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&family=Raleway:wght@100&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://baggy-whirlwind-plover.anvil.app/_/theme/download.png">
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SpeakEasi - Fear Not; Speak Boldly">
    <meta name="twitter:description" content="Conquer your public speaking fear with just a few minutes daily. Develop charisma and confidence with our fun word games.">
    <meta name="twitter:image" content="https://speakeasi.app/_/theme/logo-white%5B1%5D-logo.png">
    <meta name="twitter:image:alt" content="https://speakeasi.app/_/theme/speakeasi-favicon-color.svg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
      function copyclip(texttocopy) {
        // Create new element
        var el = document.createElement('textarea');
        // Set value (string to be copied)
        el.value = texttocopy;
        // Set non-editable to avoid focus and move outside of view
        el.setAttribute('readonly', '');
        el.style = {position: 'absolute', left: '-9999px'};
        document.body.appendChild(el);
        // Select text inside element
        el.select();
        // Copy text to clipboard
        document.execCommand('copy');
        // Remove temporary element
        document.body.removeChild(el);
      }
      function redirectToRelativeURL(relativeURL) {
        // Construct absolute URL based on the current location
        const absoluteURL = new URL(relativeURL, window.location.href);
        // Log the absolute URL (optional)
        console.log('Redirecting to:', absoluteURL.href);
        // Redirect to the absolute URL
        window.location.href = absoluteURL.href;
      }
      window.cardToPNG = function(componentElement, filename) {
        html2canvas(componentElement, {
          scale: 3,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          logging: false,
          width: componentElement.scrollWidth,
          height: componentElement.scrollHeight
        }).then(function(canvas) {
          const link = document.createElement('a');
          link.download = filename || 'export.png';
          link.href = canvas.toDataURL('image/png', 1.0);
          link.click();
        });
      };
    </script>
